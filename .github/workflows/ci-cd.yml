name: CI/CD (Terraform Outputs -> ECR -> CodeDeploy)

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build_test_push:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (lint/test)
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements-dev.txt
          pip install -r app/requirements.txt

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform init (dev)
        working-directory: terraform/environments/dev
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.DEV_ACM_CERT_ARN }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform outputs (dev)
        id: dev
        working-directory: terraform/environments/dev
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.DEV_ACM_CERT_ARN }}
        run: |
          echo "ECR_REPO_URL=$(terraform output -raw ecr_repository_url)" >> $GITHUB_ENV
          echo "CODEDEPLOY_APP_NAME=$(terraform output -raw codedeploy_app_name)" >> $GITHUB_ENV
          echo "CODEDEPLOY_DG_NAME=$(terraform output -raw codedeploy_deployment_group_name)" >> $GITHUB_ENV
          echo "ARTIFACT_BUCKET=$(terraform output -raw codedeploy_artifacts_bucket)" >> $GITHUB_ENV
          echo "SSM_IMAGE_PARAM=$(terraform output -raw ssm_image_uri_parameter_name)" >> $GITHUB_ENV

      - name: Terraform init (prod)
        working-directory: terraform/environments/prod
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.PROD_ACM_CERT_ARN }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform outputs (prod)
        working-directory: terraform/environments/prod
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.PROD_ACM_CERT_ARN }}
        run: |
          echo "ECR_REPO_URL_PROD=$(terraform output -raw ecr_repository_url)" >> $GITHUB_ENV
          echo "CODEDEPLOY_APP_NAME_PROD=$(terraform output -raw codedeploy_app_name)" >> $GITHUB_ENV
          echo "CODEDEPLOY_DG_NAME_PROD=$(terraform output -raw codedeploy_deployment_group_name)" >> $GITHUB_ENV
          echo "ARTIFACT_BUCKET_PROD=$(terraform output -raw codedeploy_artifacts_bucket)" >> $GITHUB_ENV
          echo "SSM_IMAGE_PARAM_PROD=$(terraform output -raw ssm_image_uri_parameter_name)" >> $GITHUB_ENV

      - name: Docker build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t tier-ha-web:${IMAGE_TAG} .

      - name: Push image to ECR (dev + prod)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "${ECR_REPO_URL%/*}"

          docker tag tier-ha-web:${IMAGE_TAG} "${ECR_REPO_URL}:${IMAGE_TAG}"
          docker push "${ECR_REPO_URL}:${IMAGE_TAG}"

          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "${ECR_REPO_URL_PROD%/*}"
          docker tag tier-ha-web:${IMAGE_TAG} "${ECR_REPO_URL_PROD}:${IMAGE_TAG}"
          docker push "${ECR_REPO_URL_PROD}:${IMAGE_TAG}"

      - name: Update SSM image URI (dev + prod)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ssm put-parameter --name "${SSM_IMAGE_PARAM}" --value "${ECR_REPO_URL}:${IMAGE_TAG}" --type String --overwrite
          aws ssm put-parameter --name "${SSM_IMAGE_PARAM_PROD}" --value "${ECR_REPO_URL_PROD}:${IMAGE_TAG}" --type String --overwrite

      - name: Prepare CodeDeploy revision bundle
        run: |
          mkdir -p /tmp/codedeploy-bundle
          cp scripts/codedeploy/appspec.yml /tmp/codedeploy-bundle/appspec.yml
          cp scripts/codedeploy/deploy.sh /tmp/codedeploy-bundle/deploy.sh
          chmod +x /tmp/codedeploy-bundle/deploy.sh
          cd /tmp/codedeploy-bundle
          zip -r codedeploy-revision.zip .

      - name: Upload revision bundle (dev)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws s3 cp /tmp/codedeploy-bundle/codedeploy-revision.zip "s3://${ARTIFACT_BUCKET}/codedeploy-${IMAGE_TAG}.zip"

      - name: Create deployment (staging/dev)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          DEPLOYMENT_ID="$(aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APP_NAME}" \
            --deployment-group-name "${CODEDEPLOY_DG_NAME}" \
            --s3-location bucket="${ARTIFACT_BUCKET}",key="codedeploy-${IMAGE_TAG}.zip",bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --query deploymentId --output text)"
          echo "Created deployment: $DEPLOYMENT_ID"
          aws deploy wait deployment-successful --deployment-id "$DEPLOYMENT_ID"

  deploy_prod:
    runs-on: ubuntu-latest
    needs: build_test_push
    environment: production
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform init (prod)
        working-directory: terraform/environments/prod
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.PROD_ACM_CERT_ARN }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform outputs (prod)
        working-directory: terraform/environments/prod
        env:
          TF_VAR_acm_certificate_arn: ${{ secrets.PROD_ACM_CERT_ARN }}
        run: |
          echo "CODEDEPLOY_APP_NAME_PROD=$(terraform output -raw codedeploy_app_name)" >> $GITHUB_ENV
          echo "CODEDEPLOY_DG_NAME_PROD=$(terraform output -raw codedeploy_deployment_group_name)" >> $GITHUB_ENV
          echo "ARTIFACT_BUCKET_PROD=$(terraform output -raw codedeploy_artifacts_bucket)" >> $GITHUB_ENV

      - name: Prepare CodeDeploy revision bundle
        run: |
          mkdir -p /tmp/codedeploy-bundle
          cp scripts/codedeploy/appspec.yml /tmp/codedeploy-bundle/appspec.yml
          cp scripts/codedeploy/deploy.sh /tmp/codedeploy-bundle/deploy.sh
          chmod +x /tmp/codedeploy-bundle/deploy.sh
          cd /tmp/codedeploy-bundle
          zip -r codedeploy-revision.zip .

      - name: Upload revision bundle (prod)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws s3 cp /tmp/codedeploy-bundle/codedeploy-revision.zip "s3://${ARTIFACT_BUCKET_PROD}/codedeploy-${IMAGE_TAG}.zip"

      - name: Create deployment (prod)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          DEPLOYMENT_ID="$(aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APP_NAME_PROD}" \
            --deployment-group-name "${CODEDEPLOY_DG_NAME_PROD}" \
            --s3-location bucket="${ARTIFACT_BUCKET_PROD}",key="codedeploy-${IMAGE_TAG}.zip",bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --query deploymentId --output text)"
          echo "Created deployment: $DEPLOYMENT_ID"
          aws deploy wait deployment-successful --deployment-id "$DEPLOYMENT_ID"

